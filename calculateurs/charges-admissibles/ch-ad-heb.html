<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <title>Charge admissible Poutrelles HEB</title>
    <style>

<body>
    <h2>Charge admissible Poutrelles HEB</h2>

    <label for="portee">Portée entre appuis (m) :</label>
    <input type="number" id="portee" step="0.1" oninput="calculerHEB()">

    <label for="type_heb">Type de poutrelle HEB :</label>
    <select id="type_heb" onchange="calculerHEB()">
        <option value="HEB100">HEB 100</option>
        <option value="HEB120">HEB 120</option>
        <option value="HEB140">HEB 140</option>
        <option value="HEB160">HEB 160</option>
        <option value="HEB180">HEB 180</option>
        <option value="HEB200">HEB 200</option>
        <option value="HEB220">HEB 220</option>
        <option value="HEB240">HEB 240</option>
        <option value="HEB260">HEB 260</option>
        <option value="HEB280">HEB 280</option>
        <option value="HEB300">HEB 300</option>
        <option value="HEB320">HEB 320</option>
        <option value="HEB340">HEB 340</option>
        <option value="HEB360">HEB 360</option>
        <option value="HEB400">HEB 400</option>
        <option value="HEB450">HEB 450</option>
        <option value="HEB500">HEB 500</option>
        <option value="HEB550">HEB 550</option>
        <option value="HEB600">HEB 600</option>
        <option value="HEB650">HEB 650</option>
        <option value="HEB700">HEB 700</option>
        <option value="HEB800">HEB 800</option>
        <option value="HEB900">HEB 900</option>
        <option value="HEB1000">HEB 1000</option>
    </select>

    <h3>Résultat :</h3>
    <p id="charge_admissible"></p>

    <script>
        const abaque_heb = {
            "HEB100": { "2": 4279, "2.5": 3405, "3": 2818, "3.5": 2394, "4": 2078 },
            "HEB120": { "2": 6858, "2.5": 5462, "3": 4528, "3.5": 3851, "4": 3349 },
            "HEB140": { "2": 10300, "2.5": 8209, "3": 6810, "3.5": 5800, "4": 5049 },
            "HEB160": { "2": 14842, "2.5": 11835, "3": 9824, "3.5": 8372, "4": 7293 },
            "HEB180": { "2": 20345, "2.5": 16230, "3": 13478, "3.5": 11492, "4": 10024 },
            "HEB200": { "2": 27237, "2.5": 21734, "3": 18056, "3.5": 15403, "4": 13434, "5": 10637 },
            "HEB220": { "2": 35185, "2.5": 28083, "3": 23337, "3.5": 19915, "4": 17378, "5": 13773 },
            "HEB240": { "2": 44857, "2.5": 35811, "3": 29766, "3.5": 25409, "4": 22179, "5": 17593 },
            "HEB260": { "2": 43927, "2.5": 36521, "3": 31184, "3.5": 27228, "4": 21615, "5": 17842 },
            "HEB280": { "2": 52734, "2.5": 43851, "3": 37451, "3.5": 32708, "4": 25981, "5": 21462 },
            "HEB300": { "2.5": 53409, "3": 45622, "3.5": 39852, "4": 31671, "5": 26178 },
            "HEB320": { "2.5": 61379, "3": 52437, "3.5": 45812, "4": 36421, "5": 30118 },
            "HEB340": { "2.5": 68718, "3": 58715, "3.5": 51304, "4": 40802, "5": 33756 },
            "HEB360": { "2.5": 76374, "3": 65263, "3.5": 57032, "4": 45370, "5": 37548 },
            "HEB400": { "3": 68500, "3.5": 54521, "4": 45150, "5": 38371 },
            "HEB450": { "3": 84516, "3.5": 67305, "4": 55774, "5": 47438 },
            "HEB500": { "3": 102212, "3.5": 81433, "4": 67518, "5": 57464 },
            "HEB550": { "3": 118484, "3.5": 94429, "4": 78326, "5": 66696 },
            "HEB600": { "3.5": 108380, "4": 89928, "5": 76606 },
            "HEB650": { "3.5": 123291, "4": 102330, "5": 87201 },
            "HEB700": { "3.5": 139723, "4": 115994, "5": 102245 },
            "HEB800": { "4": 142108, "5": 121192 },
            "HEB900": { "4": 148389, "5": 129432 },
            "HEB1000": { "4": 152168, "5": 134581 }
        };

        function interpolation(portee, valeurs) {
            let cles = Object.keys(valeurs).map(Number).sort((a, b) => a - b);

            if (valeurs[portee]) {
                return valeurs[portee];
            }

            if (portee < cles[0] || portee > cles[cles.length - 1]) {
                return null;
            }

            for (let i = 0; i < cles.length - 1; i++) {
                if (portee >= cles[i] && portee <= cles[i + 1]) {
                    let x1 = cles[i], x2 = cles[i + 1];
                    let y1 = valeurs[x1], y2 = valeurs[x2];
                    return y1 + ((portee - x1) / (x2 - x1)) * (y2 - y1);
                }
            }
            return null;
        }

        function calculerHEB() {
            let portee = parseFloat(document.getElementById('portee').value) || 0;
            let typeHEB = document.getElementById('type_heb').value;

            let chargeAdmissible = interpolation(portee, abaque_heb[typeHEB]);

            if (chargeAdmissible !== null) {
                document.getElementById('charge_admissible').innerText = `Charge admissible : ${chargeAdmissible.toFixed(2)} kg`;
            } else {
                document.getElementById('charge_admissible').innerText = "⚠️ Portée hors limites, aucune donnée disponible.";
            }
        }
    </script>
</body>

</html>
